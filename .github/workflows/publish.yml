name: Build and publish

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, x86, aarch64, armv7, s390x, ppc64le]
        libc: [manylinux, musllinux]
        exclude:
          - target: s390x
            libc: musllinux
          - target: ppc64le
            libc: musllinux
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/set-version
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          OPENSSL_STATIC: 1
        with:
          target: ${{ matrix.target }}
          before-script-linux: |
            if command -v yum > /dev/null; then
                yum install -y perl-IPC-Cmd perl-Time-Piece perl-Data-Dumper
            elif command -v apk > /dev/null; then
                apk add --no-cache perl-utils perl-time-piece
            elif command -v apt-get > /dev/null; then
                apt-get update && apt-get install -y perl-modules
            fi
          args: --release --out dist -i 3.10 -i 3.11 -i 3.12 -i 3.13
          sccache: 'true'
          manylinux: ${{ matrix.libc == 'musllinux' && (matrix.target == 'x86' && 'musllinux_1_1' || 'musllinux_1_2') || 'manylinux_2_28' }}
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.libc }}-${{ matrix.target }}
          path: dist

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64, x86]
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/set-version
      - uses: actions/setup-python@v4
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13
          architecture: ${{ matrix.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          OPENSSL_STATIC: 1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i 3.10 -i 3.11 -i 3.12 -i 3.13
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/set-version
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          OPENSSL_STATIC: 1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i 3.10 -i 3.11 -i 3.12 -i 3.13
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: ./.github/actions/set-version
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    needs: [linux, windows, macos, sdist]
    steps:
      - uses: actions/download-artifact@v4
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*
